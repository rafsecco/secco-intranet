# Ambiente de desenvolvimento: SQL Server local.
#   docker compose up -d
# O serviço do monolito (Secco.Intranet.Web, ADR-0002) será adicionado quando o
# projeto existir; em Development ele aplicará migrations e seed nos tenants do catálogo.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Secco@Dev123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Secco@Dev123' -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
